services:
  ollama-sycl:
    build:
      context: ollama-sycl
      dockerfile: Dockerfile
    image: ollama-sycl:local
    container_name: ollama-sycl
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ollama-volume:/root/.ollama
      - sycl-cache-volume:/root/.cache
    ports:
      - 11432:11434
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - no_proxy=localhost,127.0.0.1,ollama-sycl
      - NO_PROXY=localhost,127.0.0.1,ollama-sycl
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      - ZES_ENABLE_SYSMAN=1
      - SYCL_CACHE_PERSISTENT=1
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
      - UR_L0_USE_IMMEDIATE_COMMANDLISTS=1
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_CONTEXT_LENGTH=4096
      - OLLAMA_KV_CACHE_TYPE=q4_0
      - GGML_SYCL_F16=1
      - ClDeviceGlobalMemSizeAvailablePercent=100
      - OLLAMA_INTEL_GPU=true
      - RAG_SYSTEM_CONTEXT=True

  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    volumes:
      - open-webui-volume:/app/backend/data
    depends_on:
      - ollama-sycl
    ports:
      - 4040:8080
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - ENABLE_OPENAI_API=False
      - ENABLE_OLLAMA_API=True
      - OLLAMA_BASE_URL=http://ollama-sycl:11434
      - ENABLE_IMAGE_GENERATION=True
      - IMAGE_GENERATION_ENGINE=automatic1111
      - IMAGE_GENERATION_MODEL=dreamshaper_8
      - IMAGE_SIZE=400x400
      - IMAGE_STEPS=8
      - AUTOMATIC1111_BASE_URL=http://sdnext-ipex:7860/
      - AUTOMATIC1111_CFG_SCALE=2
      - AUTOMATIC1111_SAMPLER=DPM++ SDE
      - AUTOMATIC1111_SCHEDULER=Karras
      - ENABLE_MEMORIES=true
      - ENABLE_RAG_HYBRID_SEARCH=true
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_TOP_K=5
      - RAG_CONTEXT_LENGTH=2048
      #  Betere document chunking voor lange teksten
      - RAG_CHUNK_SIZE=512
      - RAG_CHUNK_OVERLAP=128
      #  Voorkom dat enorme uploads je server vertragen
      - MAX_FILE_SIZE_MB=100
      #  Betere realtime streaming (vooral bij langere antwoorden)
      - ENABLE_WEBSOCKET_SUPPORT=true
      #  Cache embeddings voor snellere herhaalde queries
      - RAG_EMBEDDING_CACHE=true
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama-volume: {}
  sycl-cache-volume: {}
  open-webui-volume: {}
